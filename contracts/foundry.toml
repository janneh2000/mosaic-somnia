[profile.default]
src = "src"
out = "out"
libs = ["lib"]
test = "test"
script = "script"
solc = "0.8.24"
optimizer = true
optimizer_runs = 200
via_ir = false
evm_version = "paris"
remappings = [
    "@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/",
    "forge-std/=lib/forge-std/src/"
]
fs_permissions = [{ access = "read-write", path = "./" }]

[fmt]
line_length = 100
tab_width = 4
quote_style = "double"
number_underscore = "thousands"

[rpc_endpoints]
somnia_testnet = "${SOMNIA_RPC_URL}"
somnia_mainnet = "https://api.infra.mainnet.somnia.network/"

[etherscan]
somnia_testnet = { key = "${EXPLORER_API_KEY}", url = "https://shannon-explorer.somnia.network/api" }
